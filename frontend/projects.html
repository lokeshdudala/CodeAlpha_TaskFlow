<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Projects | TaskFlow</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            📋 TaskFlow
        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">
                🏠 Dashboard
            </li>

            <li class="active">
                📁 Projects
            </li>

            <li onclick="location.href='mytasks.html'">
                📋 My Tasks
            </li>

            <li onclick="location.href='members.html'">
                👥 Members
            </li>

            <li onclick="location.href='calendar.html'">
                📅 Calendar
            </li>

            <li onclick="location.href='profile.html'">
                👤 Profile
            </li>

            <li onclick="logout()">
                🚪 Logout
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <div class="topbar">

            <div>

                <h1>
                    Projects
                </h1>

                <p>
                    Manage all your projects
                </p>

            </div>

        </div>

        <!-- Create Project -->

        <div class="create-project">

            <input
                type="text"
                id="projectName"
                placeholder="Project Name"
            >

            <textarea
                id="projectDescription"
                placeholder="Project Description"
            ></textarea>

            <button
                onclick="createProject()">

                + Create Project

            </button>

        </div>

        <!-- Project List -->

        <div
            id="projectsContainer"
            class="project-grid">

        </div>

    </main>

</div>

<script src="js/logout.js"></script>
<script src="js/projects.js"></script>

</body>

</html>
