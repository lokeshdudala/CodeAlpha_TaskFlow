<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Project Board | TaskFlow</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            📋 TaskFlow
        </div>

        <ul>

            <li onclick="location.href='dashboard.html'">
                🏠 Dashboard
            </li>

            <li class="active">
                📁 Projects
            </li>

            <li onclick="location.href='mytasks.html'">
                📋 My Tasks
            </li>

            <li onclick="location.href='members.html'">
                👥 Members
            </li>

            <li onclick="location.href='calendar.html'">
                📅 Calendar
            </li>

            <li onclick="location.href='profile.html'">
                👤 Profile
            </li>

            <li onclick="logout()">
                🚪 Logout
            </li>

        </ul>

    </aside>

    <main class="main-content">

        <div class="topbar">

            <div>

                <h1>Project Board</h1>

                <p>
                    Manage your tasks efficiently
                </p>

            </div>

            <button
                class="create-btn"
                onclick="showTaskForm()">

                + Add Task

            </button>

        </div>

        <!-- Task Form -->

        <div
            id="taskForm"
            class="task-form"
            style="display:none;">
    <input
    type="hidden"
    id="taskId">
            <input
                type="text"
                id="taskTitle"
                placeholder="Task Title">

            <textarea
                id="taskDescription"
                placeholder="Task Description"></textarea>

            <select id="taskPriority">

                <option>Low</option>

                <option selected>
                    Medium
                </option>

                <option>High</option>

            </select>
            <label>Assign To</label>

<select id="assignedTo">

    <option value="">Select Member</option>

</select>

            <input
                type="date"
                id="taskDueDate">

            <button
                onclick="createTask()">

                Create Task

            </button>

        </div>

        <!-- Board -->

        <div class="board">

            <div class="column">

                <h2>📌 To Do</h2>

                <div id="todo"></div>

            </div>

            <div class="column">

                <h2>🚀 In Progress</h2>

                <div id="progress"></div>

            </div>

            <div class="column">

                <h2>✅ Done</h2>

                <div id="done"></div>

            </div>

        </div>

    </main>

</div>

<script src="js/logout.js"></script>
<script src="js/board.js"></script>

</body>
</html>
